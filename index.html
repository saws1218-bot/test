<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5초 카운트다운</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      color: white;
      font-family: Arial, sans-serif;
    }

    .box {
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    #count {
      font-size: 120px;
      font-weight: bold;
      color: #facc15;
    }

    #message {
      font-size: 28px;
      margin-top: 20px;
      color: #22c55e;
    }

    button {
      margin-top: 30px;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    button:hover {
      background: #1d4ed8;
    }

  </style>
</head>
<body>
  <div class="box">
    <h1>카운트다운 시작</h1>
    <div id="count">5</div>
    <div id="message"></div>
    <button onclick="startCountdown()">다시 시작</button>
  </div>

  <script>
    let timer;

    function startCountdown() {
      clearInterval(timer);

      let count = 5;
      const countEl = document.getElementById("count");
      const messageEl = document.getElementById("message");

      countEl.textContent = count;
      messageEl.textContent = "";

      timer = setInterval(() => {
        count--;
        countEl.textContent = count;

        if (count === 0) {
          clearInterval(timer);
          messageEl.textContent = "완료!";
        }
      }, 1000);
    }

    startCountdown();
  </script>
</body>
</html>
